<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b3e"/>
      <stop offset="0.55" stop-color="#0a0f24"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>

    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="topHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd8f5"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#04060f" flood-opacity="0.55"/>
    </filter>
    <filter id="blurSmall" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <g filter="url(#soft)">
    <circle cx="1280" cy="70" r="200" fill="url(#orb1)"/>
    <circle cx="1480" cy="320" r="180" fill="url(#orb2)"/>
    <circle cx="980" cy="350" r="150" fill="url(#orb3)"/>
    <circle cx="120" cy="40" r="140" fill="url(#orb2)" opacity="0.5"/>
  </g>

  <!-- Subtle AI node mesh behind glass (top-right) -->
  <g stroke="#7aa2f7" stroke-opacity="0.22" fill="#7aa2f7" fill-opacity="0.5">
    <line x1="1140" y1="60" x2="1240" y2="110" stroke-width="1"/>
    <line x1="1240" y1="110" x2="1350" y2="70" stroke-width="1"/>
    <line x1="1240" y1="110" x2="1320" y2="190" stroke-width="1"/>
    <line x1="1350" y1="70" x2="1440" y2="140" stroke-width="1"/>
    <line x1="1320" y1="190" x2="1440" y2="140" stroke-width="1"/>
    <line x1="1140" y1="60" x2="1180" y2="160" stroke-width="1"/>
    <line x1="1180" y1="160" x2="1320" y2="190" stroke-width="1"/>
    <circle cx="1140" cy="60" r="3"/>
    <circle cx="1240" cy="110" r="4"/>
    <circle cx="1350" cy="70" r="3"/>
    <circle cx="1320" cy="190" r="3.5"/>
    <circle cx="1440" cy="140" r="3"/>
    <circle cx="1180" cy="160" r="3"/>
  </g>

  <!-- Golden Gate line-art silhouette, low and faint, right side -->
  <g stroke="#a3b2d0" stroke-opacity="0.16" fill="none" stroke-width="2">
    <!-- towers -->
    <line x1="1150" y1="396" x2="1150" y2="250"/>
    <line x1="1165" y1="396" x2="1165" y2="250"/>
    <line x1="1430" y1="396" x2="1430" y2="270"/>
    <line x1="1445" y1="396" x2="1445" y2="270"/>
    <!-- cross beams -->
    <line x1="1150" y1="278" x2="1165" y2="278"/>
    <line x1="1150" y1="312" x2="1165" y2="312"/>
    <line x1="1430" y1="296" x2="1445" y2="296"/>
    <line x1="1430" y1="328" x2="1445" y2="328"/>
    <!-- main cables -->
    <path d="M1080 360 Q1157 250 1290 330 Q1370 372 1437 270 Q1500 200 1560 300"/>
    <!-- suspender lines -->
    <line x1="1210" y1="312" x2="1210" y2="396"/>
    <line x1="1250" y1="324" x2="1250" y2="396"/>
    <line x1="1290" y1="330" x2="1290" y2="396"/>
    <line x1="1340" y1="318" x2="1340" y2="396"/>
    <line x1="1390" y1="300" x2="1390" y2="396"/>
  </g>

  <!-- ============ GLASS CARD: secondary (behind, offset) ============ -->
  <g filter="url(#cardShadow)">
    <rect x="640" y="86" width="690" height="250" rx="22"
          fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  </g>

  <!-- ============ GLASS CARD: primary browser window ============ -->
  <g filter="url(#cardShadow)">
    <rect x="300" y="58" width="900" height="280" rx="24"
          fill="url(#glass)" stroke="url(#glassEdge)" stroke-width="1.5"/>
  </g>
  <!-- top inner highlight -->
  <rect x="301" y="59" width="898" height="60" rx="24" fill="url(#topHighlight)"/>

  <!-- browser chrome bar -->
  <g>
    <circle cx="338" cy="92" r="6.5" fill="#ff5f57" fill-opacity="0.92"/>
    <circle cx="362" cy="92" r="6.5" fill="#febc2e" fill-opacity="0.92"/>
    <circle cx="386" cy="92" r="6.5" fill="#28c840" fill-opacity="0.92"/>
    <!-- url bar -->
    <rect x="430" y="80" width="640" height="26" rx="13" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.14"/>
    <circle cx="450" cy="93" r="4" fill="none" stroke="#7aa2f7" stroke-opacity="0.8" stroke-width="1.5"/>
    <line x1="453" y1="96" x2="457" y2="100" stroke="#7aa2f7" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="472" y="97" font-family="'SF Mono','Menlo','Courier New',monospace" font-size="13" fill="#a3b2d0" letter-spacing="0.3">agent://run( computer.use )  →  click · type · navigate</text>
  </g>
  <!-- divider under chrome -->
  <line x1="300" y1="118" x2="1200" y2="118" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- ============ CONTENT inside card ============ -->
  <!-- eyebrow -->
  <text x="338" y="158" font-family="'SF Mono','Menlo','Courier New',monospace" font-size="13" fill="#7aa2f7" letter-spacing="3">BUILDING COMPUTER-USE AI AGENTS</text>

  <!-- Name hero -->
  <text x="336" y="232" font-family="'Helvetica Neue','Arial',sans-serif" font-size="78" font-weight="700" fill="url(#nameGrad)" letter-spacing="-1.5">Max Schmitt</text>

  <!-- accent underline -->
  <rect x="340" y="250" width="240" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- tagline -->
  <text x="338" y="296" font-family="'Helvetica Neue','Arial',sans-serif" font-size="21" font-weight="400" fill="#cdd8f5">AI agents that drive the browser like a human would</text>

  <!-- mono meta line -->
  <text x="338" y="322" font-family="'SF Mono','Menlo','Courier New',monospace" font-size="13" fill="#6b7da0" letter-spacing="0.4">San Francisco  ·  ex-Microsoft Playwright</text>

  <!-- floating cursor near url bar (computer-use motif) -->
  <g transform="translate(1006,142)" fill="#ffffff" fill-opacity="0.92" stroke="#0a0f24" stroke-opacity="0.5" stroke-width="0.6">
    <path d="M0 0 L0 18 L4.5 14 L8 21 L11 19.5 L7.5 13 L13 13 Z"/>
  </g>
  <!-- click ripple -->
  <circle cx="1008" cy="142" r="16" fill="none" stroke="#7aa2f7" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="1008" cy="142" r="26" fill="none" stroke="#7aa2f7" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
